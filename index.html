<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Painel | Salao&Beleza</title>
    <!-- Vamos reutilizar o mesmo CSS do cadastro -->
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/scripts/supabase.js" defer></script>
    <script src="src/scripts/login.js" defer></script>
</head>
<body class="auth-page">
    <header>
        <h1>Salao&Beleza</h1>
        <h2>Painel profissional de atendimento e gestao</h2>
    </header>
    <main class="container">
        <section class="login-section">
            <div class="auth-intro">
                <span class="auth-kicker">Mobile profissional</span>
                <p>Agenda, atendimentos e recebimentos em um painel simples de usar no telefone.</p>
                <div class="auth-highlights">
                    <span>Rotina diaria</span>
                    <span>Financeiro organizado</span>
                    <span>Login rapido</span>
                </div>
            </div>
            <h2>Acessar painel</h2>
            <form id="login-form">
                <div class="campo">
                    <label for="email-login">E-mail profissional:</label>
                    <input type="email" id="email-login" required>
                </div>
                <div class="campo">
                    <label for="senha-login">Senha de acesso:</label>
                    <input type="password" id="senha-login" required>
                </div>
                <button type="submit">Entrar no painel</button>
            </form>
            <p class="cadastro-link">Primeiro acesso? <a href="src/pages/cadastro.html">Cadastre seu salao</a></p>
            <div id="mensagem-login"></div>
        </section>
    </main>
</body>
</html>
