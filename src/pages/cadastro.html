<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro do Salao | Salao&Beleza</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/supabase.js" defer></script>
    <script src="../scripts/cadastro.js" defer></script>
  </head>
  <body class="auth-page">
    <header>
      <h1>Salao&Beleza</h1>
      <h2>Estruture o seu atendimento em um unico painel</h2>
    </header>
    <main class="container">
      <section class="cadastro-section">
        <div class="auth-intro">
          <span class="auth-kicker">Comece pelo celular</span>
          <p>Crie seu acesso e tenha uma operacao mais clara, profissional e pronta para atender na palma da mao.</p>
          <div class="auth-highlights">
            <span>Cadastro rapido</span>
            <span>Agenda visual</span>
            <span>Controle por salao</span>
          </div>
        </div>
        <h2>Criar cadastro do salao</h2>
        <form id="cadastro-form">
          <div class="campo">
            <label for="nome-salao">Nome do salao:</label>
            <input type="text" id="nome-salao" required />
          </div>
          <div class="campo">
            <label for="email-cadastro">E-mail profissional:</label>
            <input type="email" id="email-cadastro" required />
          </div>
          <div class="campo">
            <label for="senha-cadastro">Senha de acesso:</label>
            <input type="password" id="senha-cadastro" required />
          </div>
          <div class="campo">
            <label for="confirmar-senha">Confirmar senha:</label>
            <input type="password" id="confirmar-senha" required />
          </div>
          <button type="submit">Concluir cadastro</button>
        </form>
        <p class="login-link">
          Ja possui acesso? <a href="../../index.html">Entrar no painel</a>
        </p>
        <div id="mensagem-cadastro"></div>
      </section>
    </main>
  </body>
</html>
